source = ~/.config/hypr/hyprlock-theme.conf

general {
    immediate_render = true
    screencopy_mode = 1
    hide_cursor = true
}

background {
    monitor =
    color = rgba(191724f0)
    blur_passes = 2
    blur_size = 6
    noise = 0.015
}

input-field {
    monitor =
    size = 320, 56
    position = 0, -80
    halign = center
    valign = center

    outer_color = $iris
    inner_color = rgba(1f1d2edd)
    font_color = $text
    check_color = $foam
    fail_color = $rose
    fail_text = "Incorrect password"
    placeholder_text = Password

    rounding = 6
    fade_on_empty = false
}

label {
    monitor =
    text = cmd[update:1000] date +"%I:%M %p"
    color = $text
    font_size = 64
    font_family = "Maple Mono NF"
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $subtle
    font_size = 18
    font_family = "Maple Mono NF"
    position = 0, 60
    halign = center
    valign = center
}
